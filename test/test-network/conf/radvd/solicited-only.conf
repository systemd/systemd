interface veth-peer
{
        AdvSendAdvert on;
        UnicastOnly on;
        AdvRASolicitedUnicast on;
        AdvDefaultLifetime 1800;
        RemoveAdvOnExit off;

        prefix 2002:da8:4051:0::/64
        {
                AdvOnLink on;
                AdvAutonomous on;
                AdvPreferredLifetime 1000;
                AdvValidLifetime 2100;
        };
};
