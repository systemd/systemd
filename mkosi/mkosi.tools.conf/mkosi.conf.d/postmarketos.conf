[Match]
Distribution=postmarketos

# postmarketOS is musl-based natively, so it can host the musl build directly without needing
# the musl-gcc wrapper that the Fedora tools tree uses. We don't run a PrepareScripts to pull
# systemd build deps from a downstream packaging spec — postmarketOS doesn't ship one — so the
# Packages= list below is the canonical set of build deps for the musl CI build in
# .github/workflows/unit-tests.yml (build-musl job).
[Content]
Packages=
        acl
        acl-dev
        audit-dev
        bash
        bash-completion-dev
        bpftool
        build-base
        bzip2-dev
        coccinelle
        coreutils
        cryptsetup-dev
        curl-dev
        dbus
        dbus-dev
        elfutils-dev
        gettext-dev
        git
        github-cli
        glib-dev
        gnutls-dev
        gperf
        grep
        iproute2
        iptables-dev
        kbd
        kmod
        kmod-dev
        lcov
        libapparmor-dev
        libarchive-dev
        libbpf-dev
        libcap-dev
        libcap-utils
        libfido2-dev
        libgcrypt-dev
        libgpg-error-dev
        libidn2-dev
        libmicrohttpd-dev
        libpwquality-dev
        libqrencode-dev
        libseccomp-dev
        libselinux-dev
        libucontext-dev
        libxkbcommon-dev
        linux-pam-dev
        lz4-dev
        openssl
        openssl-dev
        p11-kit-dev
        pcre2-dev
        pkgconf
        polkit-dev
        py3-elftools
        py3-jinja2
        py3-lxml
        py3-pefile
        py3-pytest
        quota-tools
        ruff
        rsync
        sfdisk
        shellcheck
        tpm2-tss-dev
        tpm2-tss-esys
        tpm2-tss-rc
        tpm2-tss-tcti-device
        tzdata
        util-linux-dev
        util-linux-misc
        utmps-dev
        valgrind-dev
        xen-dev
        zlib-dev
        zstd-dev
