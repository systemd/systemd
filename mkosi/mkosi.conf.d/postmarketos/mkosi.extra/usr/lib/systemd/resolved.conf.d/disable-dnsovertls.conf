# This overrides the following dropin file installed by postmarketos-base-systemd-resolved,
# which disables DNSOverTLS= and breaks integration tests for resolved.

[Resolve]
# This requires a DNS server that supports it. Disabling it instead of setting
# to "opportunistic", since the latter can be defeated with a downgrade attack and
# that gives a false sense of security.
#DNSOverTLS=no
